<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Martindale Abrasion Test Virtual Lab – Step 10: Remove Top Plate, Sample Holder & Clamp"/>
  <title>Step 10 – Remove Top Plate & Holder – Martindale VLab</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
  <div class="simulation-container">
    <h1 class="title">Martindale Abrasion Test</h1>

    <p class="instruction-text">
      <span class="step-badge">Step 10</span>
      <strong>1)</strong> Lift the top plate away from the abrading table.
      <strong>2)</strong> Remove the sample holder for fixing the specimen.
      <strong>3)</strong> Remove the clamp for fixing the abrading surface.
      Click the slide to reveal each removal step.
    </p>

    <!--
      Slide 10 (PPT Slide 10): Remove top plate, sample holder, clamp
      s00 = machine with top plate in place
      s01 = top plate lifted away
      s02 = sample holder removed
      s03 = clamp removed — full setup complete
      s04 = next navigation state
    -->
    <div class="img-area" id="clickZone" role="button" tabindex="0"
         aria-label="Click or press Enter to advance animation frame">
      <img src="../slides/slide_10_s00.png" alt="Martindale apparatus with top plate in position" class="active"/>
      <img src="../slides/slide_10_s01.png" alt="Step 1: Lift top plate away from abrading table"/>
      <img src="../slides/slide_10_s02.png" alt="Step 2: Remove sample holder from abrading table"/>
      <img src="../slides/slide_10_s03.png" alt="Step 3: Remove clamp ring for abrading surface – all parts removed"/>
      <div class="click-hint">Click to reveal each removal step</div>
    </div>

    <div class="toolbar">
      <a class="btn-nav btn-prev" href="step9.html" id="btn-prev" aria-label="Previous: Step 9">◀ Back</a>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" style="width:0%"></div>
      </div>
      <span class="slide-counter">1 / 4</span>
      <a class="btn-nav btn-next" href="step11.html" id="btn-next" aria-label="Next: Step 11">Next ▶</a>
    </div>
  </div>

  <script src="../js/sim-engine.js"></script>
  <script>
    new SimStep({
      container: '#clickZone',
      prevPage: 'step9.html',
      nextPage: 'step11.html',
      mode: 'auto'
    });
  </script>
</body>
</html>
