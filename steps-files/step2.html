<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Martindale Abrasion Test Virtual Lab – Step 2: Cut Woven Felt Disc (140 mm)"/>
  <title>Step 2 – Cut Woven Felt Disc – Martindale VLab</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
  <div class="simulation-container">
    <h1 class="title">Martindale Abrasion Test</h1>

    <p class="instruction-text">
      <span class="step-badge">Step 2</span>
      Place the 140 mm diameter cutter on the <strong>woven felt</strong> and press &amp; rotate the knob to cut a 140 mm disc.
      Click the slide to see each action step.
    </p>

    <!--
      Slide 2: PPT had 2 auto-sequences. Image frames:
      s00 = initial state (cutter placed on felt)
      s01 = pressing action (first click)
      s02 = final cut result (second click — full slide)
      s03/s04 = "Next" button state (navigation hint)
    -->
    <div class="img-area" id="clickZone" role="button" tabindex="0"
         aria-label="Click or press Enter to advance animation frame">
      <img src="../slides/slide_02_s00.png" alt="140mm cutter placed on woven felt" class="active"/>
      <img src="../slides/slide_02_s01.png" alt="Pressing and rotating the knob to cut"/>
      <img src="../slides/slide_02_s02.png" alt="Woven felt disc of 140mm diameter cut – final result"/>
      <div class="click-hint">Click to reveal next action</div>
    </div>

    <div class="toolbar">
      <a class="btn-nav btn-prev" href="step1.html" id="btn-prev" aria-label="Previous: Step 1">◀ Back</a>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" style="width:0%"></div>
      </div>
      <span class="slide-counter">1 / 3</span>
      <a class="btn-nav btn-next" href="step3.html" id="btn-next" aria-label="Next: Step 3">Next ▶</a>
    </div>
  </div>

  <script src="../js/sim-engine.js"></script>
  <script>
    new SimStep({
      container: '#clickZone',
      prevPage: 'step1.html',
      nextPage: 'step3.html',
      mode: 'auto'
    });
  </script>
</body>
</html>
