<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Martindale Abrasion Test Virtual Lab – Step 9: Remove Auxiliary Weights & Top Plate"/>
  <title>Step 9 – Remove Auxiliary Weights – Martindale VLab</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
  <div class="simulation-container">
    <h1 class="title">Martindale Abrasion Test</h1>

    <p class="instruction-text">
      <span class="step-badge">Step 9</span>
      Remove the <strong>auxiliary weights</strong> from the specimen holders.
      
      Click the slide to reveal each action.
    </p>

    <!--
      Slide 9 (PPT Slide 9): Remove auxiliary weights & top plate
      s00 = machine overview, initial state
      s01 = auxiliary weights highlighted/removed
      s02–s04 = next navigation states
    -->
    <div class="img-area" id="clickZone" role="button" tabindex="0"
         aria-label="Click or press Enter to advance animation frame">
      <img src="../slides/slide_09_s00.png" alt="Martindale apparatus – initial setup view" class="active"/>
      <img src="../slides/slide_09_s01.png" alt=" – complete"/>
      <img src="../slides/slide_09_s02.png" alt="Next state"/>
      <div class="click-hint">Click to reveal weight removal steps</div>
    </div>

    <div class="toolbar">
      <a class="btn-nav btn-prev" href="step8.html" id="btn-prev" aria-label="Previous: Step 8">◀ Back</a>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" style="width:0%"></div>
      </div>
      <span class="slide-counter">1 / 2</span>
      <a class="btn-nav btn-next" href="step10.html" id="btn-next" aria-label="Next: Step 10">Next ▶</a>
    </div>
  </div>

  <script src="../js/sim-engine.js"></script>
  <script>
    new SimStep({
      container: '#clickZone',
      prevPage: 'step8.html',
      nextPage: 'step10.html',
      mode: 'auto'
    });
  </script>
</body>
</html>
