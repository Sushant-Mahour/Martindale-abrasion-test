<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Martindale Abrasion Test Virtual Lab – Step 7: Cut Three 38 mm Specimens"/>
  <title>Step 7 – Cut Three Specimens – Martindale VLab</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
  <div class="simulation-container">
    <h1 class="title">Martindale Abrasion Test</h1>

    <p class="instruction-text">
      <span class="step-badge">Step 7</span>
      Cut <strong>three specimens</strong> of 38 mm diameter from the leather swatch
      for precise results. Three specimens are required to obtain an average.
      Click the slide to reveal all three specimens.
    </p>

    <!--
      Slide 7 (PPT Slide 7): Cut 3 specimens of 38mm
      s00 = single specimen (cutting action shown)
      s01 = all three 38mm specimens laid out
    -->
    <div class="img-area" id="clickZone" role="button" tabindex="0"
         aria-label="Click or press Enter to advance animation frame">
      <img src="../slides/slide_07_s00.png" alt="First specimen being cut from leather swatch using 38mm cutter" class="active"/>
      <img src="../slides/slide_07_s01.png" alt="All three 38mm diameter specimens cut – ready for testing"/>
      <div class="click-hint">Click to reveal all three specimens</div>
    </div>

    <div class="toolbar">
      <a class="btn-nav btn-prev" href="step6.html" id="btn-prev" aria-label="Previous: Step 6">◀ Back</a>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" style="width:0%"></div>
      </div>
      <span class="slide-counter">1 / 2</span>
      <a class="btn-nav btn-next" href="step8.html" id="btn-next" aria-label="Next: Step 8">Next ▶</a>
    </div>
  </div>

  <script src="../js/sim-engine.js"></script>
  <script>
    new SimStep({
      container: '#clickZone',
      prevPage: 'step6.html',
      nextPage: 'step8.html',
      mode: 'auto'
    });
  </script>
</body>
</html>
