<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Martindale Abrasion Test Virtual Lab – Step 15: Set Parameters & Start Apparatus"/>
  <title>Step 15 – Start Apparatus – Martindale VLab</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
  <div class="simulation-container">
    <h1 class="title">Martindale Abrasion Test</h1>

    <p class="instruction-text">
      <span class="step-badge">Step 15</span>
      Set all parameters: <strong>Number of cycles</strong>, <strong>Speed</strong>, and <strong>Load</strong>.
      After setting all parameters, the apparatus is ready to operate — <strong>Turn it on</strong>.
      Click the slide to reveal the control panel.
    </p>

    <!--
      Slide 15 (PPT Slide 15): Start apparatus
      s00 = machine with control panel (initial — machine diagram)
      s01 = full slide with control panel close-up and instruction text
      s02 = next navigation state
    -->
    <div class="img-area" id="clickZone" role="button" tabindex="0"
         aria-label="Click or press Enter to advance animation frame">
      <img src="../slides/slide_15_s00.png" alt="Martindale apparatus – machine diagram with control panel" class="active"/>
      <img src="../slides/slide_15_s01.png" alt="Set cycles, speed, load on control panel – Turn apparatus on"/>
      <div class="click-hint">Click to reveal control panel and instructions</div>
    </div>

    <div class="toolbar">
      <a class="btn-nav btn-prev" href="step14.html" id="btn-prev" aria-label="Previous: Step 14">◀ Back</a>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" style="width:0%"></div>
      </div>
      <span class="slide-counter">1 / 2</span>
      <a class="btn-nav btn-next" href="step15b.html" id="btn-next" aria-label="Next: Observation Video">Next ▶</a>
    </div>
  </div>

  <script src="../js/sim-engine.js"></script>
  <script>
    new SimStep({
      container: '#clickZone',
      prevPage: 'step14.html',
      nextPage: 'step15b.html',
      mode: 'auto'
    });
  </script>
</body>
</html>
